services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: financas
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d financas"]
      interval: 5s
      timeout: 5s
      retries: 10

  financas-api:
    build: ./financas-api
    restart: unless-stopped
    env_file: financas.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/financas
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  ia-api:
    build: ./ia-api
    restart: unless-stopped
    env_file: financas.env
    ports:
      - "8002:8002"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - financas-api
      - ia-api

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:
